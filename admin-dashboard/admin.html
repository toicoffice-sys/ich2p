<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    :root {
      --g900:#1B5E20; --g800:#2E7D32; --g700:#388E3C; --g600:#43A047;
      --g100:#E8F5E9; --g50:#F1F8E9;
      --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB; --gray-300:#D1D5DB;
      --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-700:#374151; --gray-900:#111827;
      --red:#DC2626; --red-bg:#FEF2F2; --amber-bg:#FFFBEB; --amber:#92400E;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, 'Inter', Arial, sans-serif;
      background: var(--gray-50); color: var(--gray-900); font-size: 14px;
    }
    header {
      background: linear-gradient(135deg, var(--g900), var(--g700));
      color: #fff; padding: 20px 28px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    header h1 { font-size: 18px; margin: 0 0 2px; }
    header p { margin: 0; font-size: 12px; color: rgba(255,255,255,0.75); }
    header a.sheet-link {
      color: #fff; text-decoration: none; font-size: 13px; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.5); padding: 8px 14px; border-radius: 8px;
    }
    header a.sheet-link:hover { background: rgba(255,255,255,0.12); }
    main { padding: 24px 28px 60px; max-width: 1200px; margin: 0 auto; }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .kpi-card {
      background: #fff; border: 1px solid var(--gray-200); border-radius: 12px;
      padding: 16px 18px;
    }
    .kpi-card .num { font-size: 24px; font-weight: 800; color: var(--g900); }
    .kpi-card .label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--gray-200); }
    .tab-btn {
      border: none; background: none; padding: 10px 18px; font-size: 14px; font-weight: 600;
      color: var(--gray-500); cursor: pointer; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--g800); border-bottom-color: var(--g700); }

    .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .toolbar input[type="search"] {
      flex: 1; min-width: 200px; padding: 9px 12px; border: 1.5px solid var(--gray-300);
      border-radius: 8px; font-size: 13px;
    }
    button.btn {
      border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-green { background: var(--g700); color: #fff; }
    .btn-green:hover { background: var(--g800); }
    .btn-outline { background: #fff; border: 1.5px solid var(--gray-300); color: var(--gray-700); }
    .btn-outline:hover { border-color: var(--g700); color: var(--g800); }
    .btn-approve { background: var(--g600); color: #fff; }
    .btn-reject { background: var(--red); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
    thead th {
      background: var(--g900); color: #fff; text-align: left; padding: 10px 12px;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
      white-space: nowrap;
    }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); font-size: 13px; vertical-align: top; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--g50); }
    .table-wrap { overflow-x: auto; border: 1px solid var(--gray-200); border-radius: 12px; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
    .badge-pending  { background: var(--amber-bg); color: var(--amber); }
    .badge-verified { background: var(--g50); color: var(--g800); }
    .badge-rejected { background: var(--red-bg); color: var(--red); }

    .proof-link { color: var(--g800); font-weight: 600; text-decoration: none; }
    .muted { color: var(--gray-400); }
    .empty-state { text-align: center; padding: 40px 0; color: var(--gray-500); }
    .loading { text-align: center; padding: 60px 0; color: var(--gray-500); }
    #toast {
      position: fixed; bottom: 20px; right: 20px; background: var(--gray-900); color: #fff;
      padding: 12px 18px; border-radius: 8px; font-size: 13px; display: none; max-width: 320px;
    }
    #toast.error { background: var(--red); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>ICH2P 2026 — Payment Dashboard</h1>
    <p>Signed in as <?= userEmail ?> · organizer view, tracking only</p>
  </div>
  <a class="sheet-link" href="<?= spreadsheetUrl ?>" target="_blank" rel="noopener">Open Spreadsheet ↗</a>
</header>

<main>
  <div id="loading" class="loading">Loading dashboard…</div>

  <div id="content" style="display:none;">
    <div class="kpi-row" id="kpiRow"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="payments" onclick="switchTab('payments')">Payments</button>
      <button class="tab-btn" data-tab="registrations" onclick="switchTab('registrations')">Registrations</button>
    </div>

    <div class="toolbar">
      <input type="search" id="searchBox" placeholder="Search by name, reference no, or email…" oninput="renderActiveTab()">
      <button class="btn btn-outline" onclick="loadDashboard()">↻ Refresh</button>
    </div>

    <div id="paymentsPane" class="table-wrap"></div>
    <div id="registrationsPane" class="table-wrap" style="display:none;"></div>
  </div>
</main>

<div id="toast"></div>

<script>
  let dashboardData = null;
  let activeTab = 'payments';

  document.addEventListener('DOMContentLoaded', loadDashboard);

  function loadDashboard() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('content').style.display = 'none';
    google.script.run
      .withSuccessHandler(onDashboardLoaded)
      .withFailureHandler(onError)
      .getDashboardData();
  }

  function onDashboardLoaded(data) {
    dashboardData = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    renderKpis();
    renderActiveTab();
  }

  function onError(err) {
    document.getElementById('loading').style.display = 'none';
    toast(err.message || String(err), true);
  }

  function renderKpis() {
    const s = dashboardData.stats;
    const collected = Object.keys(s.collected).length
      ? Object.entries(s.collected).map(([cur, amt]) => `${cur === 'USD' ? 'USD ' : 'Php'}${amt.toLocaleString()}`).join(' · ')
      : '—';
    const cards = [
      { num: s.totalRegistrations, label: 'Total Registrations' },
      { num: s.pendingVerification, label: 'Pending Verification' },
      { num: s.verified, label: 'Verified Payments' },
      { num: s.rejected, label: 'Rejected' },
      { num: collected, label: 'Total Collected' },
    ];
    document.getElementById('kpiRow').innerHTML = cards.map(c =>
      `<div class="kpi-card"><div class="num">${c.num}</div><div class="label">${c.label}</div></div>`
    ).join('');
  }

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.getElementById('paymentsPane').style.display = tab === 'payments' ? 'block' : 'none';
    document.getElementById('registrationsPane').style.display = tab === 'registrations' ? 'block' : 'none';
    renderActiveTab();
  }

  function renderActiveTab() {
    if (activeTab === 'payments') renderPayments();
    else renderRegistrations();
  }

  function matchesSearch(row, fields) {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    if (!q) return true;
    return fields.some(f => String(row[f] || '').toLowerCase().includes(q));
  }

  function statusBadge(status) {
    const cls = status === 'Verified' ? 'badge-verified' : status === 'Rejected' ? 'badge-rejected' : 'badge-pending';
    return `<span class="badge ${cls}">${escapeHtml(status || 'Pending Verification')}</span>`;
  }

  function renderPayments() {
    const rows = dashboardData.payments.filter(p => matchesSearch(p, ['Full Name', 'RegID', 'Email', 'BDO Reference No']));
    const pane = document.getElementById('paymentsPane');

    if (!rows.length) {
      pane.innerHTML = '<div class="empty-state">No payments match your search.</div>';
      return;
    }

    pane.innerHTML = `<table><thead><tr>
      <th>Timestamp</th><th>RegID</th><th>Name</th><th>Type</th><th>Amount</th>
      <th>BDO Ref No.</th><th>Proof</th><th>Status</th><th>Verified By</th><th>Actions</th>
    </tr></thead><tbody>${rows.map(rowHtml).join('')}</tbody></table>`;

    function rowHtml(p) {
      const amount = `${p.Currency === 'USD' ? 'USD ' : 'Php'}${Number(p['Amount Due'] || 0).toLocaleString()}`;
      const proof = p['Proof URL']
        ? `<a class="proof-link" href="${escapeHtml(p['Proof URL'])}" target="_blank" rel="noopener">View ↗</a>`
        : '<span class="muted">—</span>';
      const pending = (p.Status || 'Pending Verification') === 'Pending Verification';
      const actions = pending
        ? `<button class="btn btn-approve btn-sm" onclick="setStatus(${p._row}, 'Verified')">Approve</button>
           <button class="btn btn-reject btn-sm" onclick="setStatus(${p._row}, 'Rejected')">Reject</button>`
        : `<button class="btn btn-outline btn-sm" onclick="setStatus(${p._row}, 'Pending Verification')">Reset</button>`;

      return `<tr>
        <td>${escapeHtml(p.Timestamp)}</td>
        <td>${escapeHtml(p.RegID)}</td>
        <td>${escapeHtml(p['Full Name'])}<br><span class="muted">${escapeHtml(p.Email)}</span></td>
        <td>${escapeHtml(p['Registration Type'])}</td>
        <td>${amount}</td>
        <td>${escapeHtml(p['BDO Reference No'])}</td>
        <td>${proof}</td>
        <td>${statusBadge(p.Status)}</td>
        <td>${escapeHtml(p['Verified By']) || '<span class="muted">—</span>'}</td>
        <td>${actions}</td>
      </tr>`;
    }
  }

  function renderRegistrations() {
    const rows = dashboardData.registrations.filter(r => matchesSearch(r, ['Full Name', 'RegID', 'Email', 'Institution']));
    const pane = document.getElementById('registrationsPane');

    if (!rows.length) {
      pane.innerHTML = '<div class="empty-state">No registrations match your search.</div>';
      return;
    }

    pane.innerHTML = `<table><thead><tr>
      <th>Timestamp</th><th>RegID</th><th>Name</th><th>Institution</th><th>Type</th><th>Amount Due</th><th>Status</th>
    </tr></thead><tbody>${rows.map(r => `<tr>
        <td>${escapeHtml(r.Timestamp)}</td>
        <td>${escapeHtml(r.RegID)}</td>
        <td>${escapeHtml(r['Full Name'])}<br><span class="muted">${escapeHtml(r.Email)}</span></td>
        <td>${escapeHtml(r.Institution)}, ${escapeHtml(r.Country)}</td>
        <td>${escapeHtml(r['Registration Type'])}</td>
        <td>${r.Currency === 'USD' ? 'USD ' : 'Php'}${Number(r['Amount Due'] || 0).toLocaleString()}</td>
        <td>${escapeHtml(r.Status)}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  function setStatus(rowIndex, newStatus) {
    const verb = newStatus === 'Verified' ? 'approve' : newStatus === 'Rejected' ? 'reject' : 'reset';
    if (!confirm(`Are you sure you want to ${verb} this payment?`)) return;

    google.script.run
      .withSuccessHandler(data => { dashboardData = data; renderKpis(); renderActiveTab(); toast('Updated.'); })
      .withFailureHandler(onError)
      .updatePaymentStatus(rowIndex, newStatus);
  }

  function toast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3500);
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }
</script>
</body>
</html>
